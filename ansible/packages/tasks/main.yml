- name: Packages - Download and install assembl
  block:

    - name: Packages - Download assembl
      ansible.builtin.get_url:
        url: https://github.com/rossmoody/Assembl/raw/main/Release/Assembl.dmg
        dest: ../Assembl.dmg

    - name: Packages - Install install assembl
      ansible.builtin.shell: |
        if [ ! -d "/Applications/Assembl.app" ]
        then
          mkdir ../Assembl
          hdiutil attach ../Assembl.dmg -mountpoint ../Assembl
          cp -R ../Assembl/Assembl.app /Applications/Assembl.app
          hdiutil detach ../Assembl
          rm -r ../Assembl
        fi
      become: true

    - name: Webapps - Remove Assembl dmg
      ansible.builtin.file:
        path: ../Assembl.dmg
        state: absent
